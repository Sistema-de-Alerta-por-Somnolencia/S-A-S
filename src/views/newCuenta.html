<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/login.css" />

    <title>SAS - Registro</title>
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <h1>Crea una cuenta</h1>
            <form id="register-form">
                <div>
                    <label for="firstname-input">
                        <svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" height="24px"
                            viewBox="0 0 24 24" width="24px" fill="#000000"></svg>
                    </label>
                    <input type="text" name="firstname" id="firstname-input" required placeholder="Nombre Completo" />
                </div>
                <div>
                    <label for="lastname-input">
                        <svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" height="24px"
                            viewBox="0 0 24 24" width="24px" fill="#000000"></svg>
                    </label>
                    <input type="text" name="lastname" id="lastname-input" required placeholder="Apellido Completo" />
                </div>
                <div>
                    <label for="email-input">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px"
                            fill="#000000">
                            <path d="M0 0h24v24H0V0z" fill="none" />
                            <path
                                d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 4.99L4 6h16zm0 12H4V8l8 5 8-5v10z" />
                        </svg>
                    </label>
                    <input type="email" name="email" id="email-input" required placeholder="Correo Electronico" />
                </div>
                <div>
                    <label for="password-input">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px"
                            fill="#000000">
                            <g fill="none">
                                <path d="M0 0h24v24H0V0z" />
                                <path d="M0 0h24v24H0V0z" opacity=".87" />
                            </g>
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" />
                        </svg>
                    </label>
                    <input type="password" name="password" id="password-input" required placeholder="Contraseña" />
                    <button type="button" class="password-toggle">
                        <img src="/img/eye.svg" alt="Mostrar contraseña" />
                    </button>
                </div>
                <div>
                    <label for="password-input-again">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px"
                            fill="#000000">
                            <g fill="none">
                                <path d="M0 0h24v24H0V0z" />
                                <path d="M0 0h24v24H0V0z" opacity=".87" />
                            </g>
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" />
                        </svg>
                    </label>
                    <input type="password" name="password-input" id="password-input-again" required
                        placeholder="Repite la contraseña" />
                    <button type="button" class="password-toggle">
                        <img src="/img/eye.svg" alt="Mostrar contraseña" />
                    </button>
                </div>
                <p id="responseMessage"></p>
                <button type="submit">Crear</button>
            </form>
            <p>
                ¿Tienes una cuenta? <a href="/cuentaExistente">Inicia sesión</a>
            </p>
        </div>
    </div>
    <script src="/js/register.js"></script>
</body>

</html>
