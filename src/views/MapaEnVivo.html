<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa en Vivo - Plataforma Logística PIS2</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Interfaz <span>Logística</span></h2>
        </div>
        <ul class="nav-links">
            <li><a href="/principal"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="#"><i class="fas fa-truck"></i> Flota</a></li>
            <li><a href="/choferes"><i class="fas fa-users"></i> Choferes</a></li>
            <li class="active"><a href="/MapaEnVivo"><i class="fas fa-map-marked-alt"></i> Mapa en vivo</a></li>
            <li><a href="#"><i class="fas fa-exclamation-triangle"></i> Alertas</a></li>
            <li><a href="#"><i class="fas fa-tools"></i> Mantenimiento</a></li>
        </ul>
        <div class="theme-toggle">
            <button id="theme-btn"><i class="fas fa-moon"></i> Modo Noche</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-title">
                <h1>Rastreo Satelital en Vivo</h1>
            </div>
            <div class="topbar-actions">
                <span class="stat-badge">Unidades en ruta: 42</span>
                <div class="notification">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Alejandro+P&background=random" alt="User">
                    <span>Alejandro</span>
                </div>
            </div>
        </header>

        <section style="height: calc(100vh - 80px); display: flex; flex-direction: column;">
            <div class="panel map-panel" style="flex-grow: 1; display: flex; flex-direction: column;">
                <h3><i class="fas fa-globe-americas"></i> Ubicación de la Flota</h3>
                <div class="map-placeholder" style="flex-grow: 1; height: 100%;">
                    <div id="mapa-flota"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const htmlElement = document.documentElement;

        // Leer tema guardado
        const savedTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        actualizarBoton(savedTheme);

        // Cambiar tema al hacer clic
        themeBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            actualizarBoton(newTheme);
        });

        function actualizarBoton(theme) {
            if (theme === 'dark') {
                themeBtn.innerHTML = '<i class="fas fa-sun"></i> Modo Día';
            } else {
                themeBtn.innerHTML = '<i class="fas fa-moon"></i> Modo Noche';
            }
        }
    </script>

    <script src="/js/maps.js"></script>
</body>

</html>
